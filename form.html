        <article>
            <h1>Form</h1>
    
            <p>This page lists commonly-used form input (as of March 16, 2026).</p>

            <form>
                <table>
                    <tr>
                        <td>
                            <label for="username">Username:</label>
                        </td>
                        <td>
                            <input type="text" name="username" id="username" placeholder="e.g. joebiden">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="email">Email:</label>
                        </td>
                        <td>
                            <input type="email" name="email" id="email" placeholder="e.g. abc123@gmail.com">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="phone-number">Phone number:</label>
                        </td>
                        <td>
                            <input type="tel" name="phone-number" id="phone-number" max="10" placeholder="e.g. 0123456789">
                        </td>
                    </tr>
                </table>
            </form>
        </article>
